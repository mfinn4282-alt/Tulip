<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Date Planner ✨</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            transition: all 0.5s ease;
        }
        h1, h2 {
            color: #ff4d6d;
            margin-bottom: 20px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 50px;
            margin-top: 20px;
        }
        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }
        #yesBtn, .submit-btn {
            background-color: #ff4d6d;
            color: white;
        }
        #yesBtn:hover, .submit-btn:hover {
            transform: scale(1.05);
            background-color: #ff758f;
        }
        #noBtn {
            background-color: #cccccc;
            color: #333333;
            position: absolute;
        }
        /* Planner Form Styles */
        #plannerSection {
            display: none; /* Hidden at first */
            text-align: left;
            animation: fadeIn 0.5s ease-in;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            color: #444;
            margin-bottom: 8px;
        }
        input[type="date"], input[type="time"], select {
            width: 100%;
            padding: 10px;
            border: 2px border #ffccd5;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #ff4d6d;
        }
        .submit-btn {
            width: 100%;
            margin-top: 10px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="askSection">
            <h1 id="question">Will you go on a date with me? ☕✨</h1>
            <div class="buttons">
                <button id="yesBtn" onclick="showPlanner()">Yes!</button>
                <button id="noBtn" onmouseover="moveButton()">No</button>
            </div>
        </div>

        <div id="plannerSection">
            <h2>Yay! Let's plan it 🥰</h2>
            
            <div class="form-group">
                <label for="dateSelect">Pick a day:</label>
                <input type="date" id="dateSelect">
            </div>

            <div class="form-group">
                <label for="timeSelect">Pick a time:</label>
                <input type="time" id="timeSelect">
            </div>

            <div class="form-group">
                <label for="foodSelect">What are we eating?</label>
                <select id="foodSelect">
                    <option value="" disabled selected>Select an option...</option>
                    <option value="Coffee & Dessert 🍰">Coffee & Dessert 🍰</option>
                    <option value="Pizza Date 🍕">Pizza Date 🍕</option>
                    <option value="Burgers & Fries 🍔">Burgers & Fries 🍔</option>
                    <option value="Romantic Dinner 🍝">Romantic Dinner 🍝</option>
                    <option value="Ice Cream Stroll 🍦">Ice Cream Stroll 🍦</option>
                </select>
            </div>

            <button class="submit-btn" onclick="sendPlan()">Lock it in! ❤️</button>
        </div>
    </div>

    <script>
        // Move the No button
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // Transition from the question to the planner
        function showPlanner() {
            document.getElementById('askSection').style.display = 'none';
            document.getElementById('plannerSection').style.display = 'block';
            document.body.style.backgroundColor = '#ffccd5';
        }

        // Handle submission
        function sendPlan() {
            const date = document.getElementById('dateSelect').value;
            const time = document.getElementById('timeSelect').value;
            const food = document.getElementById('foodSelect').value;

            if(!date || !time || !food) {
                alert("Please fill out all options! 😊");
                return;
            }

            // Create a nicely formatted message
            const message = `Hey! Here is our date plan:\n\n📅 Date: ${date}\n⏰ Time: ${time}\n🍴 Food: ${food}\n\nCan't wait! ❤️`;
            
            // This opens the user's text sharing / email intent automatically
            const mailtoLink = `mailto:?subject=Our Date Plan!&body=${encodeURIComponent(message)}`;
            window.location.href = mailtoLink;

            // Change UI text to show it's done
            document.getElementById('plannerSection').innerHTML = `<h2>It's a date! 🗓️❤️</h2><p>Your choices have been compiled. Send the email or copy the details to text me!</p>`;
        }
    </script>
</body>
</html>
