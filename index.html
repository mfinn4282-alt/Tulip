<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Date Planner ✨</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .container {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
        }
        h1, h2 {
            color: #ff4d6d;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            line-height: 1.5;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 50px;
            margin-top: 20px;
        }
        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }
        #yesBtn, .next-btn {
            background-color: #ff4d6d;
            color: white;
        }
        #yesBtn:hover, .next-btn:hover {
            transform: scale(1.05);
            background-color: #ff758f;
        }
        #noBtn {
            background-color: #cccccc;
            color: #333333;
            position: absolute;
            transition: all 0.1s ease;
            touch-action: none; /* Prevents screen scrolling on mobile when tapping */
        }
        
        /* Tab System Construction */
        .tab-content {
            display: none; /* Hidden by default */
            text-align: left;
            animation: fadeIn 0.4s ease-in-out;
        }
        .active-tab {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            color: #444;
            margin-bottom: 8px;
        }
        input[type="date"], input[type="time"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffccd5;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #ff4d6d;
        }
        .next-btn {
            width: 100%;
            margin-top: 10px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="askTab" class="tab-content active-tab">
            <h1 id="question">Will you go on a date with me? ☕✨</h1>
            <div class="buttons">
                <button id="yesBtn" onclick="goToTab('dateTimeTab')">Yes!</button>
                <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()" ontouchstart="moveButton()">No</button>
            </div>
        </div>

        <div id="dateTimeTab" class="tab-content">
            <h2>Pick a Date & Time 🗓️</h2>
            <div class="form-group">
                <label for="dateSelect">Which day works best?</label>
                <input type="date" id="dateSelect">
            </div>
            <div class="form-group">
                <label for="timeSelect">What time?</label>
                <input type="time" id="timeSelect">
            </div>
            <button class="next-btn" onclick="validateDateTime()">Next: Plan Activities ✨</button>
        </div>

        <div id="activitiesTab" class="tab-content">
            <h2>What are we doing? 🥂</h2>
            <p style="text-align: center; font-size: 0.9rem; margin-bottom: 20px;">Choose the vibe for our date:</p>
            
            <div class="form-group">
                <label for="activitySelect">Our main plan:</label>
                <select id="activitySelect">
                    <option value="" disabled selected>Select an activity...</option>
                    <option value="Grabbing cozy coffee & talking for hours ☕">Cozy Coffee & Talking ☕</option>
                    <option value="Going on a romantic dinner date 🍝">Romantic Dinner Date 🍝</option>
                    <option value="Watching a movie together with snacks 🍿">Movie Night 🍿</option>
                    <option value="Going on a scenic walk & eating ice cream 🍦">Scenic Walk & Ice Cream 🍦</option>
                    <option value="An adventurous arcade or bowling night 🎳">Arcade / Bowling Night 🎳</option>
                </select>
            </div>
            <button class="next-btn" onclick="finishPlanning()">Lock it in! ❤️</button>
        </div>

        <div id="finalTab" class="tab-content" style="text-align: center;">
            <h2>It's officially a date! 🥰💘</h2>
            <p>I’ve compiled your choices. Click the button below to send the details directly back to me!</p>
            <button class="next-btn" id="sendBtn">Send Plan to Me 📱</button>
        </div>
    </div>

    <script>
        // Ultimate runaway logic: works seamlessly on screens of all sizes
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            
            // Limit bounds so it doesn't move completely off the visible screen
            const padding = 50;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Standard navigation function to swap tabs
        function goToTab(tabId) {
            // Hide all tabs
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => tab.classList.remove('active-tab'));
            
            // Show target tab
            document.getElementById(tabId).classList.add('active-tab');
            
            // Brighten background as progress is made
            if (tabId !== 'askTab') {
                document.body.style.backgroundColor = '#ffccd5';
            }
        }

        // Basic verification for Step 2
        function validateDateTime() {
            const date = document.getElementById('dateSelect').value;
            const time = document.getElementById('timeSelect').value;
            
            if (!date || !time) {
                alert("Please select both a date and a time! 😊");
                return;
            }
            goToTab('activitiesTab');
        }

        // Prepares data and setups final dynamic mail/text actions
        function finishPlanning() {
            const date = document.getElementById('dateSelect').value;
            const time = document.getElementById('timeSelect').value;
            const activity = document.getElementById('activitySelect').value;

            if (!activity) {
                alert("Please select an activity vibe! 🗓️");
                return;
            }

            // Nicely formats text representation
            const message = `Hey! I filled out the planner. Here is our date layout:\n\n📅 Date: ${date}\n⏰ Time: ${time}\n✨ Activity: ${activity}\n\nSee you then! 😉❤️`;
            
            // Updates button configuration to easily forward to you
            const sendBtn = document.getElementById('sendBtn');
            
            // Set up a mailto anchor
            sendBtn.onclick = function() {
                const mailtoLink = `mailto:?subject=Our Date Details!&body=${encodeURIComponent(message)}`;
                window.location.href = mailtoLink;
            };

            goToTab('finalTab');
        }
    </script>
</body>
</html>
